name: Daily News Refresh
 
"on":
  schedule:
    # Runs every day at 7:00 AM UTC (3:00 AM ET / 12:00 AM PT)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab
 
jobs:
  refresh:
    runs-on: ubuntu-latest
 
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install feedparser requests
 
      - name: Run news refresh script
        run: python update_news.py
 
      - name: Commit and push updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: daily news refresh $(date -u '+%Y-%m-%d')"
          git push
